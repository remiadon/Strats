stages:
  extract:
    foreach: ${silver}
    do:
      cmd:
        - python -m extract.io --dataset ${key} --corr-threshold 0.9

  signatures:  # TODO : play with cadences as defined in params.yaml
    foreach:
      - period: 1w
        sources: stock_history eu_fx
      - period: 1q
        sources: stock_history eu_fx eu_uncertainty
    do:
      cmd: python -m transform.signatures --sources ${item.sources} -o data/eu_signatures_${item.period}.parquet --period ${item.period} --group-by ticker
      outs:
        - data/eu_signatures_${item.period}.parquet
      metrics:
        - metrics/eu_signatures_${item.period}.json

stages:
  extract:
    foreach:
      - eu_fx
      - eu_uncertainty
      - eu_shorts
      - stock_history
    do:
      cmd: 
        - python -m extract.${item} --output data/${item}.parquet
      outs:
        - data/${item}.parquet
      metrics:
        - metrics/${item}.json

  transform:
    cmd: 
      - python -m transform.signatures -i data/stock_history.parquet data/eu_fx.parquet -o data/signatures.parquet
    deps:
      - data/stock_history.parquet
      - data/eu_fx.parquet
    outs:
      - data/signatures.parquet
    metrics:
      - metrics/signatures.json

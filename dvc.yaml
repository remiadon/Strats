stages:
  extract:
    foreach:
      - eu_fx
      - eu_uncertainty
      - eu_shorts
    do:
      cmd: 
        - python -m extract.${item} --output data/${item}.parquet
        - python -c "import pandas as pd; print(pd.read_parquet('data/${item}.parquet').describe(percentiles=[]).to_json('metrics/${item}.json', orient='index', indent=2))"
      outs:
        - data/${item}.parquet
      metrics:
        - metrics/${item}.json

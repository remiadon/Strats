stages:
  extract:
    foreach:
      - eu_fx
      - eu_uncertainty
      - eu_shorts
      - stock_history
    do:
      cmd: 
        - python -m extract.${item} --output data/${item}.parquet
        - python -c "import pandas as pd; print(pd.read_parquet('data/${item}.parquet').describe(percentiles=[]).to_json('metrics/${item}.json', orient='index', indent=2))"
      outs:
        - data/${item}.parquet
      metrics:
        - metrics/${item}.json

  transform@diff:
    foreach:
      - eu_fx
      - eu_uncertainty
      - stock_history
    do:
      cmd:
        - python -c "import polars as pl; import polars.selectors as cs; pl.scan_parquet('data/${item}.parquet').with_columns(cs.numeric().diff()).sink_parquet('data/${item}_diff.parquet')"
      outs:
        - data/${item}_diff.parquet
      deps:
        - data/${item}.parquet
